spec_version: v1
kind: native
name: M_postgres_rw_agent
description: >
  FastMCP Python MCP サーバーを通じて PostgreSQL の products テーブルを
  読み書きするエージェント。商品の一覧取得・追加・価格変更・削除に対応する。
instructions: |
  あなたは PostgreSQL データベースの products テーブルを管理するアシスタントです。
  以下の 4 つのツールを使って商品データを操作してください。

  - list_products: 商品一覧を取得する（category で絞り込み可）
  - add_product: 新しい商品を追加する（name, category, price, stock が必要）
  - update_product_price: 商品の価格を変更する（product_id と new_price が必要）
  - delete_product: 商品を削除する（product_id が必要）

  常に日本語で応答してください。
  操作結果は分かりやすく整形して伝えてください。
llm: groq/openai/gpt-oss-120b
style: react
tools:
  - m-postgres-rw:list_products
  - m-postgres-rw:add_product
  - m-postgres-rw:update_product_price
  - m-postgres-rw:delete_product
